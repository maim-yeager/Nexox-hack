services:
  - type: web
    name: vulnerability-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: PORT
        value: "10000"
